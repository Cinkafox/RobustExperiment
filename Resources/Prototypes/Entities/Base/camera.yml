- type: entity
  id: camera
  components:
    - type: InputMover
    - type: Input
      context: human
    - type: Camera
      fov: 4
      shift: 0,1.8,-5
      rotation: 0,0,0
    - type: RigidBody
      friction: 3
      restitution: 0.1
      density: 2
      shape:
        !type:BoxShape
        halfExtents: 0.4, 1, 0.4
    - type: Model
      currentMesh:
        path: "/Models/alexandra/untitled_back.obj"
        offset: 0,-1.2,0
    - type: AlexandraAnimation
    - type: Skeleton
    - type: BoneCompound
      compoundEntId: alexandraSkeleton
      offset: 0,-1.2,0