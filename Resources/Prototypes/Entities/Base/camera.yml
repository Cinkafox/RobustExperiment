- type: entity
  id: baseControlable
  components:
    - type: InputMover
    - type: Input
      context: human
    - type: Camera
      fov: 4
      shift: 1.2,1.2,-3
      rotation: 0,0,0
    - type: RigidBody
      friction: 3
      restitution: 0.1
      density: 2
      shape:
        !type:BoxShape
        halfExtents: 0.4, 1, 0.4