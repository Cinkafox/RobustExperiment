- type: entity
  id: car
  components:
    - type: Model
      currentMesh: "/Models/car/lowpoly car.obj"
    - type: RigidBody
      shape:
         !type:BoxShape
         halfExtents: 1, 0.7, 0.9
         
- type: entity
  id: machine
  components:
    - type: Model
      currentMesh:
        path: "/Models/machine/machine.obj"
        offset: 0,-2.2,0
    - type: RigidBody
      physType: Static
      shape:
        !type:BoxShape
        halfExtents: 1.2, 0.7, 0.9        
         
- type: entity
  id: floor
  components:
    - type: RigidBody
      physType: Static
      shape:
        !type:PlaneShape
        distance: 1
      
- type: entity
  id: nyash
  components:
    - type: Model
      currentMesh: "/Models/nyash/nyash.obj"
      
- type: entity
  id: femboy
  components:
    - type: Model
      currentMesh: "/Models/femboy/femboy.obj"